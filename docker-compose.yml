services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    tty: true
    environment:
      - APP_KEY=base64:bWVyei1sZWNrLWVpZXI=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=":memory:"
      - CACHE_DRIVER=array
      - QUEUE_CONNECTION=sync
      - XDEBUG_MODE=coverage