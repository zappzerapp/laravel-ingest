name: Test and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:

    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with BuildKit cache
        uses: docker/bake-action@v5
        with:
          files: |
            docker-compose.ci.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
          load: true

      - name: Start Docker services
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Check code style with Pint
        run: docker compose -f docker-compose.ci.yml exec -T --user root app composer lint:check

      - name: Run static analysis with Larastan
        run: docker compose -f docker-compose.ci.yml exec -T --user root app composer analyse

      - name: Run Pest tests
        run: docker compose -f docker-compose.ci.yml exec -T --user root app composer test

      - name: Stop Docker services
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  publish:
    needs: test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v5

      - uses: retypeapp/action-build@latest

      - uses: retypeapp/action-github-pages@latest
        with:
          update-branch: true
